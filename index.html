<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>社内SE謹製・一括バーコード生成ツール Ver.3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { border-left: 6px solid #2c3e50; padding-left: 15px; color: #2c3e50; margin-bottom: 25px; }
        .config-section { background: #fdfdfd; border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        #input-fields-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .field-item { background: #fff; border: 1px inset #f0f0f0; padding: 10px; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button { flex: 1; background-color: #2c3e50; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #3e5871; transform: translateY(-1px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }
        #downloadBtn { background-color: #27ae60; }

        #result-area { 
            margin-top: 30px; 
            padding: 20px; 
            border: 2px dashed #bdc3c7; 
            min-height: 200px; 
            background: #fafafa; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px;
            justify-items: center;
        }
        #result-area.single { display: flex; justify-content: center; align-items: center; }
        
        .barcode-card { background: white; padding: 10px; border: 1px solid #eee; text-align: center; width: 240px; }
        .barcode-card img { max-width: 100%; height: auto; }
        
        .hint { font-size: 0.85em; color: #666; margin-top: 20px; padding: 15px; background: #eef2f3; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>社内SE謹製・一括バーコード生成</h2>
    
    <div class="config-section">
        <div style="display: flex; gap: 20px;">
            <div class="input-group" style="flex: 1;">
                <label>① 複数作りたいときは入力（最大10個）</label>
                <input type="number" id="countInput" min="1" max="10" value="1" 
                    onkeydown="if(event.key==='Enter'){updateInputFields(); event.preventDefault();}"
                    oninput="updateInputFields()">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>② 規格の選択</label>
                <select id="format">
                    <option value="CODE128">CODE128 (推奨)</option>
                    <option value="CODE39">CODE39 (一般的)</option>
                </select>
            </div>
        </div>

        <label>③ バーコードにする文字を入力</label>
        <div id="input-fields-container">
            </div>
    </div>

    <div class="btn-group">
        <button onclick="generateAllBarcodes()">④ まとめてバーコードを作成</button>
        <button id="downloadBtn" onclick="exportToExcel()" disabled>⑤ Excelで一括出力する</button>
    </div>

    <div id="result-area" class="single">
        <p id="placeholderText">こちらにバーコードが並びます</p>
    </div>

    <div class="hint">
        <b>【社内SEの豆知識】</b><br>
        ・個数を入力して<b>エンター</b>を押すと、入力欄が即座に切り替わります。<br>
        ・バーコードの内容を入力中に<b>エンター</b>を押すと、すぐに作成を開始します。
    </div>
</div>

<script>
    // ページ読み込み時に実行
    window.onload = function() {
        updateInputFields();
    };

    function updateInputFields() {
        const container = document.getElementById('input-fields-container');
        let count = parseInt(document.getElementById('countInput').value) || 1;
        
        // 10個までに制限
        if (count > 10) { count = 10; document.getElementById('countInput').value = 10; }
        if (count < 1) { count = 1; document.getElementById('countInput').value = 1; }

        // 現在の値を保持しておく（打ち直し防止）
        const currentValues = Array.from(document.querySelectorAll('.barcode-val')).map(i => i.value);

        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.className = 'field-item';
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'barcode-val';
            input.placeholder = `例: ITEM-00${i}`;
            input.value = currentValues[i-1] || '';
            // 入力欄でエンターを押すと生成実行
            input.onkeydown = function(e) {
                if (e.key === 'Enter') generateAllBarcodes();
            };

            const label = document.createElement('small');
            label.innerText = `${i}つ目`;
            
            div.appendChild(label);
            div.appendChild(input);
            container.appendChild(div);
        }
    }

    function generateAllBarcodes() {
        const inputs = document.querySelectorAll('.barcode-val');
        const fmt = document.getElementById('format').value;
        const resultArea = document.getElementById('result-area');
        const downloadBtn = document.getElementById('downloadBtn');
        
        resultArea.innerHTML = '';
        let hasData = false;

        if (inputs.length <= 1) {
            resultArea.classList.add('single');
        } else {
            resultArea.classList.remove('single');
        }

        inputs.forEach((input) => {
            const val = input.value.trim();
            if (!val) return;
            hasData = true;

            const card = document.createElement('div');
            card.className = 'barcode-card';
            const canvas = document.createElement('canvas');
            const img = document.createElement('img');
            img.className = 'generated-img';

            try {
                JsBarcode(canvas, val, {
                    format: fmt,
                    lineColor: "#000",
                    width: 2,
                    height: 60,
                    displayValue: true,
                    background: "#ffffff"
                });
                img.src = canvas.toDataURL("image/png");
                card.appendChild(img);
                resultArea.appendChild(card);
            } catch (e) { console.error(e); }
        });

        if (!hasData) {
            alert("恐れ入ります、何か文字を入力してくださいませ。");
            resultArea.innerHTML = '<p id="placeholderText">こちらにバーコードが並びます</p>';
            downloadBtn.disabled = true;
        } else {
            downloadBtn.disabled = false;
        }
    }

    async function exportToExcel() {
        const imgs = document.querySelectorAll('.generated-img');
        if (imgs.length === 0) return;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('バーコード一覧');

        imgs.forEach((img, index) => {
            const imageId = workbook.addImage({
                base64: img.src,
                extension: 'png',
            });
            worksheet.addImage(imageId, {
                tl: { col: 1, row: 1 + (index * 6) },
                ext: { width: 250, height: 80 }
            });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `バーコード一括出力.xlsx`;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
